<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="590" viewBox="0 0 1180 590">
  <rect width="1180" height="590" rx="18" fill="#f8fafc"/>
  <rect x="28" y="28" width="1124" height="534" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="28" y="28" width="1124" height="48" rx="14" fill="#f6f8fa"/>
  <circle cx="58" cy="52" r="7" fill="#ff5f57"/>
  <circle cx="82" cy="52" r="7" fill="#ffbd2e"/>
  <circle cx="106" cy="52" r="7" fill="#28c840"/>
  <text x="138" y="58" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#57606a">VrEnvironmentController.cs - scene cache before generation</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="20">
    <text x="58" y="116" fill="#6e7781">01</text><text x="104" y="116" fill="#cf222e">var</text><text x="144" y="116" fill="#24292f"> cacheKey = ComputeCacheKey(</text>
    <text x="58" y="146" fill="#6e7781">02</text><text x="164" y="146" fill="#24292f">session.Civilization, session.YearRange,</text>
    <text x="58" y="176" fill="#6e7781">03</text><text x="164" y="176" fill="#24292f">session.LocationOldName, session.RoleOrName);</text>
    <text x="58" y="216" fill="#6e7781">04</text><text x="104" y="216" fill="#cf222e">var</text><text x="144" y="216" fill="#24292f"> cached = </text><text x="260" y="216" fill="#8250df">await</text><text x="330" y="216" fill="#24292f"> _sceneCacheRepository.GetByCacheKeyAsync(cacheKey);</text>
    <text x="58" y="246" fill="#6e7781">05</text><text x="104" y="246" fill="#cf222e">if</text><text x="144" y="246" fill="#24292f"> (cached != </text><text x="284" y="246" fill="#0550ae">null</text><text x="334" y="246" fill="#24292f">)</text>
    <text x="58" y="276" fill="#6e7781">06</text><text x="104" y="276" fill="#24292f">{</text>
    <text x="58" y="306" fill="#6e7781">07</text><text x="134" y="306" fill="#cf222e">var</text><text x="174" y="306" fill="#24292f"> cachedScene = JsonSerializer.Deserialize&lt;object&gt;(cached.SceneJson);</text>
    <text x="58" y="336" fill="#6e7781">08</text><text x="134" y="336" fill="#cf222e">return</text><text x="214" y="336" fill="#24292f"> Ok(</text><text x="264" y="336" fill="#0550ae">new</text><text x="314" y="336" fill="#24292f"> { success = </text><text x="478" y="336" fill="#0550ae">true</text><text x="532" y="336" fill="#24292f">, cached = </text><text x="660" y="336" fill="#0550ae">true</text><text x="714" y="336" fill="#24292f">, data = cachedScene });</text>
    <text x="58" y="366" fill="#6e7781">09</text><text x="104" y="366" fill="#24292f">}</text>
    <text x="58" y="406" fill="#6e7781">10</text><text x="104" y="406" fill="#cf222e">var</text><text x="144" y="406" fill="#24292f"> scene = </text><text x="244" y="406" fill="#8250df">await</text><text x="314" y="406" fill="#24292f"> _vrService.GenerateSceneAsync(...);</text>
    <text x="58" y="436" fill="#6e7781">11</text><text x="104" y="436" fill="#cf222e">var</text><text x="144" y="436" fill="#24292f"> newCache = </text><text x="284" y="436" fill="#0550ae">new</text><text x="334" y="436" fill="#24292f"> SceneCache { SceneJson = JsonSerializer.Serialize(scene) };</text>
    <text x="58" y="466" fill="#6e7781">12</text><text x="104" y="466" fill="#8250df">await</text><text x="174" y="466" fill="#24292f"> _sceneCacheRepository.AddAsync(newCache);</text>
    <text x="58" y="506" fill="#6e7781">13</text><text x="104" y="506" fill="#6a737d">// Cache hit returns instantly; cache miss calls the external VR Generator.</text>
  </g>
</svg>
