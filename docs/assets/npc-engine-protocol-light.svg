  <text x="138" y="58" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#57606a">NpcAIService.cs - NPC Engine two-message protocol</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="20">
    <text x="58" y="116" fill="#6e7781">01</text><text x="104" y="116" fill="#cf222e">var</text><text x="144" y="116" fill="#24292f"> payload = </text><text x="260" y="116" fill="#0550ae">new</text><text x="306" y="116" fill="#24292f"> LlmConfigPayload</text>
    <text x="58" y="146" fill="#6e7781">02</text><text x="104" y="146" fill="#24292f">{</text>
    <text x="58" y="176" fill="#6e7781">03</text><text x="134" y="176" fill="#24292f">World = </text><text x="226" y="176" fill="#0550ae">new</text><text x="272" y="176" fill="#24292f"> LlmWorld</text>
    <text x="58" y="206" fill="#6e7781">04</text><text x="134" y="206" fill="#24292f">{</text>
    <text x="58" y="236" fill="#6e7781">05</text><text x="164" y="236" fill="#24292f">YearRange = ParseYearRange(sessionData.YearRange),</text>
    <text x="58" y="266" fill="#6e7781">06</text><text x="164" y="266" fill="#24292f">LocationOldName = sessionData.LocationOldName,</text>
    <text x="58" y="296" fill="#6e7781">07</text><text x="164" y="296" fill="#24292f">Civilization = sessionData.Civilization,</text>
    <text x="58" y="326" fill="#6e7781">08</text><text x="164" y="326" fill="#24292f">RoleOrName = roleOrName</text>
    <text x="58" y="356" fill="#6e7781">09</text><text x="134" y="356" fill="#24292f">}</text>
    <text x="58" y="386" fill="#6e7781">10</text><text x="104" y="386" fill="#24292f">};</text>
    <text x="58" y="426" fill="#6e7781">11</text><text x="104" y="426" fill="#8250df">await</text><text x="174" y="426" fill="#24292f"> ws.SendAsync(encoded.AsMemory(), WebSocketMessageType.Text, </text><text x="858" y="426" fill="#0550ae">true</text><text x="910" y="426" fill="#24292f">, token);</text>
    <text x="58" y="456" fill="#6e7781">12</text><text x="104" y="456" fill="#8250df">await</text><text x="174" y="456" fill="#24292f"> ws.SendAsync(audioBytes.AsMemory(), WebSocketMessageType.Binary, </text><text x="904" y="456" fill="#0550ae">true</text><text x="956" y="456" fill="#24292f">, token);</text>
    <text x="58" y="496" fill="#6e7781">13</text><text x="104" y="496" fill="#6a737d">// Message 1: JSON config, Message 2: WAV audio bytes</text>
